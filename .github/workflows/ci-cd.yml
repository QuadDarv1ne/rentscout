name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit

    - name: Run Bandit
      run: bandit -r app/ -ll -ii

    - name: Run Safety
      run: safety check -r requirements.txt || true

    - name: Run pip-audit
      run: pip-audit -r requirements.txt || true

  lint:
    name: 📏 Lint & Format
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy

    - name: Run Black (format check)
      run: black --check app/ scripts/

    - name: Run Ruff (linter)
      run: ruff check app/ scripts/

    - name: Run Mypy (type check)
      run: mypy app/ --ignore-missing-imports --no-strict-optional

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rentscout
          POSTGRES_PASSWORD: test_password_secure_123
          POSTGRES_DB: rentscout_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql+asyncpg://rentscout:test_password_secure_123@localhost:5432/rentscout_test
        REDIS_URL: redis://:test_password_secure_123@localhost:6379/0
      run: |
        alembic upgrade head

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://rentscout:test_password_secure_123@localhost:5432/rentscout_test
        REDIS_URL: redis://:test_password_secure_123@localhost:6379/0
        TESTING: true
        SECRET_KEY: test_secret_key_for_ci_pipeline_minimum_32_chars
        JWT_SECRET: test_jwt_secret_for_ci_pipeline_minimum_32_chars
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [test]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rentscout
          POSTGRES_PASSWORD: test_password_secure_123
          POSTGRES_DB: rentscout_integration
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run migrations
      env:
        DATABASE_URL: postgresql+asyncpg://rentscout:test_password_secure_123@localhost:5432/rentscout_integration
        REDIS_URL: redis://:test_password_secure_123@localhost:6379/0
      run: |
        alembic upgrade head

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql+asyncpg://rentscout:test_password_secure_123@localhost:5432/rentscout_integration
        REDIS_URL: redis://:test_password_secure_123@localhost:6379/0
        TESTING: true
        SECRET_KEY: test_secret_key_for_ci_pipeline_minimum_32_chars
        JWT_SECRET: test_jwt_secret_for_ci_pipeline_minimum_32_chars
      run: |
        pytest tests/integration/ -v --cov=app --cov-report=xml

  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=sha,prefix=sha-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, integration-test]
    if: github.ref == 'refs/heads/develop' && github.event_name != 'pull_request'

    environment:
      name: staging
      url: https://staging.rentscout.dev

    steps:
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        # Add your deployment commands here
        # Example: kubectl apply -f k8s/staging/
        # Example: docker-compose -f docker-compose.prod.yml up -d

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: https://rentscout.dev

    steps:
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production environment..."
        # Add your deployment commands here
        # Example: kubectl apply -f k8s/production/
        # Example: docker-compose -f docker-compose.prod.yml up -d

[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    .pytest_cache,
    .venv,
    venv,
    build,
    dist,
    *.egg-info,
    migrations,
    docs,
    scripts

ignore =
    E203,
    W503,
    E501,
    E731,

[coverage:run]
source = app/
omit =
    */tests/*
    */migrations/*
    */venv/*
    */.venv/*
    */settings/*
    app/main.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if settings.DEBUG